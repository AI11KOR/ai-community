<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 서버 테스트</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        textarea { width: 100%; height: 150px; margin: 10px 0; }
        button { padding: 10px 20px; background: #4F46E5; color: white; border: none; border-radius: 6px; cursor: pointer; margin-right: 10px; }
        pre { background: #f4f4f4; padding: 20px; border-radius: 6px; white-space: pre-wrap; }
        input[type="text"] { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #eee; border-radius: 8px; }
        h3 { margin-top: 0; }
    </style>
</head>
<body>
    <h2>AI 서버 테스트</h2>

    <!-- 토큰 입력 -->
    <div class="section">
        <h3>🔑 토큰 설정</h3>
        <input type="text" id="token" placeholder="localStorage에서 복사한 accessToken 붙여넣기" />
        <button onclick="loadToken()">자동 불러오기</button>
    </div>

    <!-- AI 서버 직접 테스트 -->
    <div class="section">
        <h3>🤖 AI 서버 직접 (포트 5005)</h3>
        <textarea id="code" placeholder="테스트할 코드를 입력하세요...">def bubble_sort(arr):
    for i in range(len(arr)):
        for j in range(len(arr)-1):
            if arr[j] > arr[j+1]:
                arr[j], arr[j+1] = arr[j+1], arr[j]</textarea>
        <button onclick="testReview()">코드 리뷰</button>
        <button onclick="testSimilarity()">유사도 탐지</button>
    </div>

    <!-- 백엔드 경유 테스트 -->
    <div class="section">
        <h3>🔗 백엔드 경유 (포트 8008) - 토큰 필요</h3>
        <button onclick="testReviewViaBackend()">코드 리뷰 (백엔드)</button>
        <button onclick="testSimilarityViaBackend()">유사도 탐지 (백엔드)</button>
    </div>

    <!-- 회의록 테스트 -->
    <div class="section">
        <h3>🎙️ 회의록 생성</h3>
        <input type="file" id="audioFile" accept="audio/*" />
        <button onclick="testTranscribe()">AI 직접</button>
        <button onclick="testTranscribeViaBackend()">백엔드 경유</button>
    </div>

    <h3>결과:</h3>
    <pre id="result">여기에 결과가 표시됩니다</pre>

    <script>
        const AI_URL = 'http://localhost:5005'
        const BACKEND_URL = 'http://localhost:8008'

        // 토큰 자동 불러오기 (같은 브라우저면 가능)
        function loadToken() {
            const token = localStorage.getItem('accessToken')
            if (token) {
                document.getElementById('token').value = token
                alert('토큰 불러오기 성공!')
            } else {
                alert('토큰 없음. 먼저 로그인하세요.')
            }
        }

        function getToken() {
            return document.getElementById('token').value
        }

        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${getToken()}`
            }
        }

        // AI 직접
        async function testReview() {
            const code = document.getElementById('code').value
            document.getElementById('result').textContent = '로딩 중...'
            const res = await fetch(`${AI_URL}/ai/review`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code })
            })
            const data = await res.json()
            document.getElementById('result').textContent = JSON.stringify(data, null, 2)
        }

        async function testSimilarity() {
            const code = document.getElementById('code').value
            document.getElementById('result').textContent = '로딩 중...'
            const res = await fetch(`${AI_URL}/ai/similarity`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code })
            })
            const data = await res.json()
            document.getElementById('result').textContent = JSON.stringify(data, null, 2)
        }

        // 백엔드 경유
        async function testReviewViaBackend() {
            const code = document.getElementById('code').value
            document.getElementById('result').textContent = '로딩 중...'
            const res = await fetch(`${BACKEND_URL}/api/ai/review`, {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ code })
            })
            const data = await res.json()
            document.getElementById('result').textContent = JSON.stringify(data, null, 2)
        }

        async function testSimilarityViaBackend() {
            const code = document.getElementById('code').value
            document.getElementById('result').textContent = '로딩 중...'
            const res = await fetch(`${BACKEND_URL}/api/ai/similarity`, {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ code })
            })
            const data = await res.json()
            document.getElementById('result').textContent = JSON.stringify(data, null, 2)
        }

        // 회의록
        async function testTranscribe() {
            const file = document.getElementById('audioFile').files[0]
            if (!file) { alert('음성 파일을 선택해주세요'); return }
            document.getElementById('result').textContent = '음성 변환 중...'
            const formData = new FormData()
            formData.append('audio', file)
            const res = await fetch(`${AI_URL}/ai/transcribe`, {
                method: 'POST',
                body: formData
            })
            const data = await res.json()
            document.getElementById('result').textContent = JSON.stringify(data, null, 2)
        }

        async function testTranscribeViaBackend() {
            const file = document.getElementById('audioFile').files[0]
            if (!file) { alert('음성 파일을 선택해주세요'); return }
            document.getElementById('result').textContent = '음성 변환 중...'
            const formData = new FormData()
            formData.append('audio', file)
            const res = await fetch(`${BACKEND_URL}/api/ai/transcribe`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${getToken()}` },
                body: formData
            })
            const data = await res.json()
            document.getElementById('result').textContent = JSON.stringify(data, null, 2)
        }
    </script>
</body>
</html>
