services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_dev_community
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    
  backend:
    build: ./backend
    environment:
      PORT: 8008
      DATABASE_URL: postgresql://postgres:password@db:5432/ai_dev_community?schema=public
      AI_SERVER_URL: http://ai:5005
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - ai
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: https://baepo.shop
    depends_on:
      - backend
    restart: unless-stopped

  ai:
    build: ./ai
    env_file:
      - ./ai/.env
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
    